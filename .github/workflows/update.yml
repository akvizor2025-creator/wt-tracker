name: Weekly WT data refresh
on:
  schedule:
    - cron: "0 12 * * 1,4"   # Mondays & Thursdays 12:00 UTC
  workflow_dispatch:          # manual "Run workflow" button
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch latest WT data
        run: python scripts/update_data.py
      - name: Commit if changed
        run: |
          git config user.name "wt-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/live.json
          git diff --cached --quiet || (git commit -m "auto: refresh WT news/changelog data" && git push)
